# ============================================================
# AC IR Control — Two Rooms — Home Assistant Configuration
# ============================================================
#
# Architecture:
#   HA thermostat card
#     → MQTT climate entity (platform: mqtt)
#       → command topics  ha/ac/<room>/cmd/<field>
#         → automation    calls pyscript.ac_handle_cmd
#           → pyscript    generates IR code → Z2M → IR blaster
#             → publishes ha/ac/<room>/state  (retained)
#               → MQTT climate entity updates state
#
# input_* helpers act as persistent storage for current settings
# across HA restarts (pyscript publishes their values on startup).
#
# REQUIREMENTS:
#   - Zigbee2MQTT with both IR blasters paired
#   - pyscript integration with allow_all_imports: true
#   - pyscript/ac_ir_generator.py
#   - MQTT integration enabled
# ============================================================


# ── Input helpers — persistent storage of current settings ─────
input_number:
  ac_living_temperature:
    name: "AC Living Room — Temperature"
    min: 16
    max: 30
    step: 1
    unit_of_measurement: "°C"
    icon: mdi:thermometer
    initial: 25

  ac_bedroom_temperature:
    name: "AC Bedroom — Temperature"
    min: 16
    max: 30
    step: 1
    unit_of_measurement: "°C"
    icon: mdi:thermometer
    initial: 25

input_select:
  ac_living_mode:
    name: "AC Living Room — Mode"
    options: [cool, fan, dry, economy]
    initial: cool
    icon: mdi:air-conditioner

  ac_bedroom_mode:
    name: "AC Bedroom — Mode"
    options: [cool, fan, dry, economy]
    initial: cool
    icon: mdi:air-conditioner

  ac_living_fan:
    name: "AC Living Room — Fan Speed"
    options: [auto, high, mid, low]
    initial: auto
    icon: mdi:fan

  ac_bedroom_fan:
    name: "AC Bedroom — Fan Speed"
    options: [auto, high, mid, low]
    initial: auto
    icon: mdi:fan

input_boolean:
  ac_living_power:
    name: "AC Living Room — Power"
    initial: false
    icon: mdi:power

  ac_bedroom_power:
    name: "AC Bedroom — Power"
    initial: false
    icon: mdi:power


# ── MQTT climate entities ───────────────────────────────────────
# These are proper registered HA entities — full thermostat UI,
# area assignment, history, etc.
# State is published to retained topics by pyscript on startup
# and whenever input_* helpers change.

climate:
  - platform: mqtt
    name: "Living Room AC"
    unique_id: ac_living_room
    modes: ["off", "cool", "fan_only", "dry"]
    fan_modes: ["auto", "high", "mid", "low"]
    min_temp: 16
    max_temp: 30
    temp_step: 1
    mode_state_topic: "ha/ac/living/state"
    mode_state_template: "{{ value_json.mode }}"
    temperature_state_topic: "ha/ac/living/state"
    temperature_state_template: "{{ value_json.temperature }}"
    fan_mode_state_topic: "ha/ac/living/state"
    fan_mode_state_template: "{{ value_json.fan_mode }}"
    current_temperature_topic: "ha/ac/living/state"
    current_temperature_template: "{{ value_json.current_temperature | default(none, true) }}"
    mode_command_topic: "ha/ac/living/cmd/mode"
    temperature_command_topic: "ha/ac/living/cmd/temperature"
    fan_mode_command_topic: "ha/ac/living/cmd/fan_mode"

  - platform: mqtt
    name: "Bedroom AC"
    unique_id: ac_bedroom
    modes: ["off", "cool", "fan_only", "dry"]
    fan_modes: ["auto", "high", "mid", "low"]
    min_temp: 16
    max_temp: 30
    temp_step: 1
    mode_state_topic: "ha/ac/bedroom/state"
    mode_state_template: "{{ value_json.mode }}"
    temperature_state_topic: "ha/ac/bedroom/state"
    temperature_state_template: "{{ value_json.temperature }}"
    fan_mode_state_topic: "ha/ac/bedroom/state"
    fan_mode_state_template: "{{ value_json.fan_mode }}"
    current_temperature_topic: "ha/ac/bedroom/state"
    current_temperature_template: "{{ value_json.current_temperature | default(none, true) }}"
    mode_command_topic: "ha/ac/bedroom/cmd/mode"
    temperature_command_topic: "ha/ac/bedroom/cmd/temperature"
    fan_mode_command_topic: "ha/ac/bedroom/cmd/fan_mode"


# ── Automations — bridge MQTT command topics → pyscript ─────────
automation:
  - id: ac_mqtt_living_mode
    alias: "AC Living — MQTT mode"
    trigger:
      - platform: mqtt
        topic: "ha/ac/living/cmd/mode"
    action:
      - action: pyscript.ac_handle_cmd
        data:
          room: living
          cmd: mode
          value: "{{ trigger.payload }}"

  - id: ac_mqtt_living_temp
    alias: "AC Living — MQTT temperature"
    trigger:
      - platform: mqtt
        topic: "ha/ac/living/cmd/temperature"
    action:
      - action: pyscript.ac_handle_cmd
        data:
          room: living
          cmd: temperature
          value: "{{ trigger.payload }}"

  - id: ac_mqtt_living_fan
    alias: "AC Living — MQTT fan"
    trigger:
      - platform: mqtt
        topic: "ha/ac/living/cmd/fan_mode"
    action:
      - action: pyscript.ac_handle_cmd
        data:
          room: living
          cmd: fan_mode
          value: "{{ trigger.payload }}"

  - id: ac_mqtt_bedroom_mode
    alias: "AC Bedroom — MQTT mode"
    trigger:
      - platform: mqtt
        topic: "ha/ac/bedroom/cmd/mode"
    action:
      - action: pyscript.ac_handle_cmd
        data:
          room: bedroom
          cmd: mode
          value: "{{ trigger.payload }}"

  - id: ac_mqtt_bedroom_temp
    alias: "AC Bedroom — MQTT temperature"
    trigger:
      - platform: mqtt
        topic: "ha/ac/bedroom/cmd/temperature"
    action:
      - action: pyscript.ac_handle_cmd
        data:
          room: bedroom
          cmd: temperature
          value: "{{ trigger.payload }}"

  - id: ac_mqtt_bedroom_fan
    alias: "AC Bedroom — MQTT fan"
    trigger:
      - platform: mqtt
        topic: "ha/ac/bedroom/cmd/fan_mode"
    action:
      - action: pyscript.ac_handle_cmd
        data:
          room: bedroom
          cmd: fan_mode
          value: "{{ trigger.payload }}"
